<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(rgba(7, 20, 36, 0.72), rgba(7, 20, 36, 0.72)),
          url("https://images.unsplash.com/photo-1517336714739-489689fd1ca8?auto=format&fit=crop&w=1400&q=80");
        background-size: cover;
        background-position: center;
      }

      .container { width: min(1080px, 92%); margin: 0 auto; }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 30;
        backdrop-filter: blur(9px);
        background: rgba(2, 10, 22, 0.7);
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      }

      .header-wrap {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 14px 0;
      }

      .site-title {
        margin: 0;
        font-size: clamp(21px, 3vw, 31px);
        color: #eaf4ff;
      }

      .navbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .navbar a {
        color: #eaf4ff;
        text-decoration: none;
        border-radius: 999px;
        padding: 8px 14px;
        font-size: 14px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: rgba(255, 255, 255, 0.1);
      }

      .navbar a:hover {
        background: linear-gradient(120deg, #6d8dff, #3fcbff);
        border-color: transparent;
      }

      .contact-wrap {
        display: flex;
        justify-content: center;
        padding: 34px 14px;
      }

      .contact-card {
        width: min(460px, 100%);
        background: rgba(255, 255, 255, 0.95);
        border-radius: 12px;
        padding: 22px;
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.25);
      }

      h1 {
        margin: 0 0 8px;
        color: #10233a;
      }

      p {
        margin: 0 0 16px;
        color: #38506c;
      }

      label {
        display: block;
        font-weight: 700;
        color: #10233a;
        margin-bottom: 6px;
      }

      input,
      select,
      textarea,
      button {
        width: 100%;
        border: 1px solid #c9d6e3;
        border-radius: 8px;
        padding: 10px 11px;
        margin-bottom: 12px;
        font-size: 14px;
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      button {
        background: #0a66c2;
        color: #fff;
        border: none;
        font-weight: 700;
        cursor: pointer;
        margin-bottom: 0;
      }

      button:hover {
        background: #074f96;
      }
    </style>
</head>
<body>
    <header class="site-header">
      <div class="container header-wrap" id="maincontainer">
        <h1 class="site-title">Kitso's Repair Shop</h1>
        <nav class="navbar" id="navbar">
          <a href="index.html">Home</a>
          <a href="services.html">Services</a>
          <a href="about.html">About Us</a>
          <a href="contact.html">Contact Us</a>
          <a href="feedback.html">Feedback</a>
        </nav>
      </div>
    </header>

    <div class="contact-wrap">
    <main class="contact-card">
      <h1>Contact Phone Service</h1>
      <p>Fill in your details and our technician will call you back.</p>

      <form>
        <label for="fullName">Full Name</label>
        <input id="fullName" type="text" placeholder="Enter your full name" required>

        <label for="phoneNumber">Phone Number</label>
        <input id="phoneNumber" type="tel" placeholder="e.g. 71 234 567" required>

        <label for="customerCategory">Customer Category</label>
        <select id="customerCategory" required>
          <option value="">-- Choose category --</option>
          <option>Adult</option>
          <option>Student</option>
        </select>

        <label for="serviceType">Service Needed</label>
        <select id="serviceType" required>
          <option value="">-- Choose service --</option>
          <option>Screen Replacement</option>
          <option>Battery Replacement</option>
          <option>Charging Port Repair</option>
          <option>Software Support</option>
        </select>

        <label for="message">Message</label>
        <textarea id="message" placeholder="Tell us your phone model and issue"></textarea>

        <button type="submit">Send Request</button>
      </form>
    </main>
    </div>
</body>
</html>
